<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Phòng khám</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        table {
            margin-top: 10px;
            width: 100%;
            text-align: left;
            border-collapse: collapse;
        }
        thead {
            background-color: #f2f2f2;
        }
        th, td {
            padding: 8px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <h2>Thêm Bệnh Nhân Mới</h2>
    <form id="patientForm">
        <div class="form-group">
            <label for="name">Họ tên:</label>
            <input type="text" id="name" required>
        </div>
        
        <div class="form-group">
            <label for="gender">Giới tính:</label>
            <select id="gender" required>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="phone">SĐT:</label>
            <input type="text" id="phone">
        </div>
        
        <div class="form-group">
            <label for="address">Địa chỉ:</label>
            <input type="text" id="address">
        </div>
        
        <button type="button" onclick="addPatient()">Lưu Bệnh Nhân</button>
    </form>

    <hr>

    <h2>Danh sách Bệnh Nhân</h2>
    <button onclick="loadPatients()">Tải lại danh sách</button>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Mã BN</th>
                <th>Họ tên</th>
                <th>Giới tính</th>
                <th>SĐT</th>
                <th>Địa chỉ</th>
            </tr>
        </thead>
        <tbody id="patientTableBody">
            </tbody>
    </table>

    <script>
        const API_URL = "https://clinic-backend-1-8qsb.onrender.com/patients";

        async function loadPatients() {
            try {
                const response = await fetch(API_URL);
                const patients = await response.json();
                
                const tbody = document.getElementById("patientTableBody");
                tbody.innerHTML = ""; 
                
                patients.forEach(p => {
                    tbody.innerHTML += `<tr>
                        <td>${p.id}</td>
                        <td><strong>${p.patient_code}</strong></td>
                        <td>${p.name}</td>
                        <td>${p.gender}</td>
                        <td>${p.phone}</td>
                        <td>${p.address}</td>
                    </tr>`;
                });
            } catch (error) {
                console.error("Lỗi khi tải danh sách:", error);
            }
        }

        async function addPatient() {
            const patientData = {
                name: document.getElementById("name").value,
                gender: document.getElementById("gender").value,
                phone: document.getElementById("phone").value,
                address: document.getElementById("address").value
            };

            try {
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(patientData)
                });

                alert("Đã lưu thành công!");
                document.getElementById("patientForm").reset();
                loadPatients(); 
            } catch (error) {
                alert("Có lỗi xảy ra khi lưu!");
                console.error("Lỗi thêm bệnh nhân:", error);
            }
        }

        window.onload = loadPatients;
    </script>
</body>

</html>
